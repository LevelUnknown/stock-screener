name: Daily Reddit momentum scan

on:
  schedule:
    # 10:47 UTC = 6:47am ET (adjusts to 5:47am during standard time) - before US market open, weekdays.
    # Moved earlier from 11:30 and off the congested :30 minute because GitHub's scheduler was
    # running 1.5-2h late, pushing the scan past US market open. This restores the pre-open buffer.
    - cron: "47 10 * * 1-5"
  workflow_dispatch: {}   # lets you trigger a run manually from the Actions tab

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scanner
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
        run: python scanner.py

      - name: Commit report and history
        run: |
          git config user.name "momentum-bot"
          git config user.email "actions@github.com"
          git add data/ reports/ REPORT.md
          git diff --cached --quiet || git commit -m "Daily scan $(date -u +%F)"
          git push
